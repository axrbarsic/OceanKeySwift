name: OceanKeySwift
options:
  bundleIdPrefix: com.alex.oceankey
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "49"
    DEVELOPMENT_TEAM: J6MW4855LU
targets:
  OceanKeySwift:
    type: application
    platform: iOS
    sources:
      - OceanKeySwift
    resources:
      - OceanKeySwift/Resources
    dependencies:
      - sdk: SpriteKit.framework
      - sdk: GameplayKit.framework
      - sdk: AVKit.framework
      - sdk: Speech.framework
      - sdk: SwiftData.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alex.oceankey.swift
        INFOPLIST_KEY_CFBundleDisplayName: OceanKey Swift
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: OceanKeySwift/Info.plist
      properties:
        CFBundleDisplayName: OceanKey Swift
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CADisableMinimumFrameDurationOnPhone: true
        NSCameraUsageDescription: OceanKey uses the camera to attach local photos and videos to carts and rooms.
        NSMicrophoneUsageDescription: OceanKey records audio while capturing local videos.
        NSSpeechRecognitionUsageDescription: OceanKey transcribes local Russian voice notes into editable text.
        UILaunchScreen: {}
  OceanKeySwiftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - OceanKeySwiftTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: OceanKeySwift
